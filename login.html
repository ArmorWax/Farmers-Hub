<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SugbUma</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="icon" type="image/png" href="images/sugbuma-logo.svg">
</head>
<body>
    <header>
        <h1><img src="images/sugbuma-logo.svg" alt="SugbUma Logo" style="width: 40px; height: 40px; margin-right: 0.5rem;"> SugbUma <span class="tagline">Smart Farming Hub</span></h1>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="feed.html"><i class="fas fa-rss"></i> Feed</a>
            <a href="market.html"><i class="fas fa-chart-line"></i> Market</a>
            <a href="report.html"><i class="fas fa-exclamation-triangle"></i> Reports</a>
            <a href="community.html"><i class="fas fa-users"></i> Community</a>
            <a href="travel.html"><i class="fas fa-map"></i> Travel</a>
            <a href="produce.html"><i class="fas fa-leaf"></i> Products</a>
            <a href="signup.html"><i class="fas fa-user-plus"></i> Sign Up</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
        </nav>
    </header>
    <main>
        <section class="card auth-card">
            <div class="section-head">
                <h3>Welcome back!</h3>
                <span class="status-chip">Farm smarter today</span>
            </div>
            <form id="loginForm">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Your password" required>
                </div>
                <button class="btn btn-primary" type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            <p id="message" class="note"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SugbUma. All rights reserved.</p>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
