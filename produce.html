        const productGrid = document.getElementById('productGrid');
        const searchBar = document.getElementById('searchBar');
        const cartItemsElement = document.getElementById('cartItems');
        const cartTotalElement = document.getElementById('cartTotal');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const cartKey = currentUser ? `cart_${currentUser.email}` : 'cart_guest';
        let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
        let currentCategory = 'all';

        function saveCart() {
            localStorage.setItem(cartKey, JSON.stringify(cart));
        }

        function renderProducts(filter = 'all', query = '') {
            productGrid.innerHTML = '';
            const normalizedQuery = query.trim().toLowerCase();
            const filtered = products.filter(product => {
                const matchesCategory = filter === 'all' || product.category === filter;
                const matchesQuery = product.name.toLowerCase().includes(normalizedQuery) || product.category.toLowerCase().includes(normalizedQuery);
                return matchesCategory && matchesQuery;
            });

            if (!filtered.length) {
                productGrid.innerHTML = '<p class="empty">No products found. Try a different search term.</p>';
                return;
            }

            filtered.forEach(product => {
                const card = document.createElement('article');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="product-card-body">
                        <p>${product.category}</p>
                        <h4>${product.name}</h4>
                        <div class="product-meta">
                            <span class="product-price">₱${product.price}/${product.unit}</span>
                            <button class="btn btn-secondary" type="button" data-id="${product.id}">Add to Cart</button>
                        </div>
                    </div>
                `;
                const addButton = card.querySelector('button');
                addButton.addEventListener('click', () => addToCart(product.id));
                productGrid.appendChild(card);
            });
        }

        function renderCart() {
            cartItemsElement.innerHTML = '';
            if (!cart.length) {
                cartItemsElement.innerHTML = '<li class="empty">Your cart is empty.</li>';
                cartTotalElement.textContent = '0.00';
                return;
            }

            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                const listItem = document.createElement('li');
                listItem.className = 'cart-item';
                listItem.dataset.id = item.id;
                listItem.innerHTML = `
                    <div class="cart-item-details">
                        <strong>${item.name}</strong>
                        <span>₱${item.price}/${item.unit}</span>
                    </div>
                    <div class="cart-item-actions">
                        <div class="qty-controls">
                            <button class="qty-btn" data-action="decrease">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" data-action="increase">+</button>
                        </div>
                        <button class="remove-btn" type="button">Remove</button>
                    </div>
                `;
                cartItemsElement.appendChild(listItem);
            });
            cartTotalElement.textContent = total.toFixed(2);
        }

        function updateCartCount() {
            if (window.updateCartCount) window.updateCartCount();
        }

        function addToCart(productId) {
            const product = products.find(item => item.id === productId);
            if (!product) return;
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ id: product.id, name: product.name, price: product.price, unit: product.unit, qty: 1 });
            }
            saveCart();
            renderCart();
            updateCartCount();
            window.showToast && window.showToast(`${product.name} added to cart.`, 'success');
        }

        function removeCartItem(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            renderCart();
            updateCartCount();
        }

        function changeCartQuantity(productId, action) {
            const item = cart.find(entry => entry.id === productId);
            if (!item) return;
            if (action === 'increase') {
                item.qty += 1;
            } else if (action === 'decrease') {
                item.qty -= 1;
            }
            if (item.qty <= 0) {
                removeCartItem(productId);
                return;
            }
            saveCart();
            renderCart();
            updateCartCount();
        }

        cartItemsElement.addEventListener('click', function(event) {
            const button = event.target.closest('button');
            if (!button) return;
            const itemElement = button.closest('.cart-item');
            if (!itemElement) return;
            const productId = itemElement.dataset.id;
            const action = button.dataset.action;
            if (action) {
                changeCartQuantity(productId, action);
            } else if (button.classList.contains('remove-btn')) {
                removeCartItem(productId);
            }
        });

        function setActiveCategory(categoryButton) {
            document.querySelectorAll('.tab-btn').forEach(button => button.classList.remove('active'));
            categoryButton.classList.add('active');
            currentCategory = categoryButton.dataset.category;
            renderProducts(currentCategory, searchBar.value);
        }

        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', function() {
                setActiveCategory(this);
            });
        });

        searchBar.addEventListener('input', function() {
            renderProducts(currentCategory, this.value);
        });

        checkoutBtn.addEventListener('click', function() {
            if (!cart.length) {
                window.showToast && window.showToast('Your cart is empty.', 'warning');
                return;
            }
            if (!currentUser) {
                localStorage.setItem('toastMessage', 'Please sign in to place your order.');
                localStorage.setItem('toastType', 'warning');
                window.location.href = 'login.html';
                return;
            }
            localStorage.removeItem(cartKey);
            cart = [];
            renderCart();
            updateCartCount();
            localStorage.setItem('toastMessage', 'Order placed successfully! Thank you.');
            localStorage.setItem('toastType', 'success');
            window.location.href = 'dashboard.html';
        });

        renderProducts();
        renderCart();
    </script>
</body>
</html>
